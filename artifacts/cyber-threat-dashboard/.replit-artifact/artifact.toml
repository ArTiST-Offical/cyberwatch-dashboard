kind = "web"
previewPath = "/"
title = "CyberWatch - Threat Intelligence Dashboard"
version = "1.0.0"
id = "artifacts/cyber-threat-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22283

[services.development]
run = "pnpm --filter @workspace/cyber-threat-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cyber-threat-dashboard", "run", "build" ]
publicDir = "artifacts/cyber-threat-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22283"
BASE_PATH = "/"
